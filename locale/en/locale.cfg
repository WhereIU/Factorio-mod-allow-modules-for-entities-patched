[mod-setting-name]
amfe2-allow-all-cat=Allow ALL module categories
amfe2-allow-cat=Allowed module categories
amfe2-allow-entity=Enable entity modifications
amfe2-allow-surface=Allow surface effects
amfe2-module-extra=Bonus module slots
amfe2-allow-asem=Modify assembling machines
amfe2-allow-furn=Modify furnaces
amfe2-allow-silo=Modify rocket silos
amfe2-allow-lab=Modify research labs
amfe2-allow-dril=Modify mining drills
amfe2-allow-beac=Modify beacons
amfe2-profile=Beacon efficiency profile
amfe2-counter=Beacon counter type
amfe2-allow-recipe=Modify recipes
amfe2-maximum-productivity=Maximum productivity cap

[mod-setting-description]
amfe2-allow-all-cat=When enabled, ALL module categories (including custom categories from other mods) will be allowed in all modified entities.
amfe2-allow-cat=Comma-separated list of module categories to allow when the option above is disabled. Defaults to speed, efficiency, productivity, quality, overclock.
amfe2-allow-entity=Toggle for entity modifications. Must be enabled for the building filters below to take effect.
amfe2-allow-surface=Allows all modified entities to receive surface-specific environmental effects.
amfe2-module-extra=Adds this number of additional module slots to all modified entities. Set to 0 to leave default slot counts unchanged.
amfe2-allow-asem=Allow all module effects and categories on assembling machine structures.
amfe2-allow-furn=Allow all module effects and categories on furnace structures.
amfe2-allow-silo=Allow all module effects and categories on rocket silo structures.
amfe2-allow-lab=Allow all module effects and categories on research lab structures.
amfe2-allow-dril=Allow all module effects and categories on mining drill structures.
amfe2-allow-beac=Allow all module effects and categories on beacon structures.
amfe2-profile=Comma-separated multiplier list for beacon dimming. Defaults to Factorio 2.0 diminishing returns. Set to "1,0" to allow only 1 effective beacon.
amfe2-counter=How beacons are counted for the dimming profile.\n"total": All nearby beacons share a single counter.\n"same_type": Beacons only diminish effects from other beacons of the exact same type.
amfe2-allow-recipe=Removes module restrictions from all recipes, allowing modules everywhere.
amfe2-maximum-productivity=Caps or overrides the max productivity limit on all recipes. For example, set to 3.0 for a 300% cap. Set to 0.0 to leave unmodified.